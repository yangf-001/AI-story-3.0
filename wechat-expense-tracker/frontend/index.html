<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信支出监测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 24px; font-weight: 600; color: #00d4aa; }
        
        .status-bar {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }
        .status-dot.active { background: #00d4aa; box-shadow: 0 0 10px #00d4aa; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary { background: #00d4aa; color: #1a1a2e; }
        .btn-primary:hover { background: #00f5c4; transform: translateY(-2px); }
        .btn-danger { background: #ff6b6b; color: #fff; }
        .btn-danger:hover { background: #ff8585; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }
        .card-value.warning { color: #ffd93d; }
        .card-value.danger { color: #ff6b6b; }
        .card-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 8px; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .chart-container { height: 250px; }
        
        .expense-list { margin-top: 30px; }
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .expense-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .expense-left { display: flex; align-items: center; gap: 16px; }
        .expense-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .expense-info h4 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
        .expense-info p { font-size: 12px; color: rgba(255,255,255,0.5); }
        .expense-amount { font-size: 20px; font-weight: 600; color: #ff6b6b; }
        .expense-delete { 
            background: none; border: none; color: rgba(255,255,255,0.3); 
            cursor: pointer; padding: 5px; margin-left: 10px;
            transition: color 0.3s;
        }
        .expense-delete:hover { color: #ff6b6b; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal h2 { margin-bottom: 20px; color: #00d4aa; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: rgba(255,255,255,0.7); }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #00d4aa;
        }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
        
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active { background: #00d4aa; color: #1a1a2e; }
        
        .category-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
        }
        .cat-餐饮 { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .cat-交通 { background: rgba(78, 205, 196, 0.2); color: #4ecdc4; }
        .cat-购物 { background: rgba(255, 217, 61, 0.2); color: #ffd93d; }
        .cat-娱乐 { background: rgba(108, 92, 231, 0.2); color: #a29bfe; }
        .cat-生活 { background: rgba(0, 206, 201, 0.2); color: #00cec9; }
        .cat-其他 { background: rgba(128, 128, 128, 0.2); color: #888; }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4aa, #00f5c4);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-fill.warning { background: linear-gradient(90deg, #ffd93d, #ffed4a); }
        .progress-fill.danger { background: linear-gradient(90deg, #ff6b6b, #ff8585); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeIn 0.5s ease forwards; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 微信支出监测系统</h1>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot" id="adbStatus"></div>
                    <span id="adbStatusText">ADB未连接</span>
                </div>
                <div class="status-item">
                    <div class="status-dot" id="monitorStatus"></div>
                    <span id="monitorStatusText">未监听</span>
                </div>
                <button class="btn btn-primary" onclick="toggleMonitor()" id="monitorBtn">开始监听</button>
                <button class="btn btn-primary" onclick="showAddModal()">+ 添加支出</button>
            </div>
        </header>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">今日支出</div>
                <div class="card-value" id="todayTotal">¥0</div>
                <div class="card-sub">预算剩余: <span id="dailyRemaining">¥200</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="dailyProgress" style="width: 0%"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">本月支出</div>
                <div class="card-value" id="monthTotal">¥0</div>
                <div class="card-sub">预算剩余: <span id="monthRemaining">¥5000</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="monthProgress" style="width: 0%"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">支出笔数</div>
                <div class="card-value" id="expenseCount">0</div>
                <div class="card-sub">今日 <span id="todayCount">0</span> 笔 / 本月 <span id="monthCount">0</span> 笔</div>
            </div>
            <div class="card">
                <div class="card-title">总支出</div>
                <div class="card-value" id="totalExpenses">¥0</div>
                <div class="card-sub" id="budgetWarning"></div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="card">
                <div class="card-title">本周支出趋势</div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="card">
                <div class="card-title">支出分类</div>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="card expense-list">
            <div class="card-title">最近支出</div>
            <div id="expenseList"></div>
        </div>
    </div>
    
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2>添加支出</h2>
            <div class="form-group">
                <label>金额 (元)</label>
                <input type="number" id="amountInput" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label>类别</label>
                <select id="categoryInput">
                    <option value="餐饮">餐饮</option>
                    <option value="交通">交通</option>
                    <option value="购物">购物</option>
                    <option value="娱乐">娱乐</option>
                    <option value="生活">生活</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="descInput" placeholder="可选备注">
            </div>
            <div class="modal-btns">
                <button class="btn" style="background: rgba(255,255,255,0.1); color: #fff;" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="addExpense()">添加</button>
            </div>
        </div>
    </div>

    <script>
        let trendChart, categoryChart;
        let isMonitoring = false;
        
        const categoryIcons = { '餐饮': '🍔', '交通': '🚗', '购物': '🛍️', '娱乐': '🎮', '生活': '🏠', '其他': '📦' };
        
        async function init() {
            await loadStatus();
            await loadStatistics();
            initCharts();
            setInterval(loadStatus, 5000);
            setInterval(loadStatistics, 10000);
        }
        
        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                const adbDot = document.getElementById('adbStatus');
                const adbText = document.getElementById('adbStatusText');
                if (data.adb_connected) {
                    adbDot.classList.add('active');
                    adbText.textContent = `已连接: ${data.devices[0]}`;
                } else {
                    adbDot.classList.remove('active');
                    adbText.textContent = 'ADB未连接';
                }
                
                const monDot = document.getElementById('monitorStatus');
                const monText = document.getElementById('monitorStatusText');
                const monBtn = document.getElementById('monitorBtn');
                if (data.monitoring) {
                    monDot.classList.add('active');
                    monText.textContent = '监听中';
                    monBtn.textContent = '停止监听';
                    monBtn.classList.remove('btn-primary');
                    monBtn.classList.add('btn-danger');
                } else {
                    monDot.classList.remove('active');
                    monText.textContent = '未监听';
                    monBtn.textContent = '开始监听';
                    monBtn.classList.remove('btn-danger');
                    monBtn.classList.add('btn-primary');
                }
            } catch(e) {
                console.error('Status error:', e);
            }
        }
        
        async function loadStatistics() {
            try {
                const res = await fetch('/api/statistics');
                const stats = await res.json();
                
                document.getElementById('todayTotal').textContent = `¥${stats.today_total.toFixed(2)}`;
                document.getElementById('monthTotal').textContent = `¥${stats.month_total.toFixed(2)}`;
                document.getElementById('totalExpenses').textContent = `¥${stats.total.toFixed(2)}`;
                document.getElementById('expenseCount').textContent = stats.expense_count;
                document.getElementById('todayCount').textContent = stats.today_count;
                document.getElementById('monthCount').textContent = stats.month_count;
                
                document.getElementById('dailyRemaining').textContent = `¥${stats.daily_remaining.toFixed(2)}`;
                document.getElementById('monthRemaining').textContent = `¥${stats.budget_remaining.toFixed(2)}`;
                
                const dailyPct = Math.min(100, (stats.today_total / stats.daily_budget) * 100);
                const monthPct = Math.min(100, (stats.month_total / stats.monthly_budget) * 100);
                
                const dailyProg = document.getElementById('dailyProgress');
                dailyProg.style.width = `${dailyPct}%`;
                dailyProg.className = 'progress-fill' + (dailyPct > 90 ? ' danger' : dailyPct > 70 ? ' warning' : '');
                
                const monthProg = document.getElementById('monthProgress');
                monthProg.style.width = `${monthPct}%`;
                monthProg.className = 'progress-fill' + (monthPct > 90 ? ' danger' : monthPct > 70 ? ' warning' : '');
                
                const totEl = document.getElementById('totalExpenses');
                totEl.className = 'card-value' + (stats.budget_remaining < 0 ? ' danger' : stats.budget_remaining < stats.monthly_budget * 0.2 ? ' warning' : '');
                
                if (stats.budget_warning) {
                    document.getElementById('budgetWarning').textContent = stats.budget_warning;
                    document.getElementById('budgetWarning').style.color = '#ff6b6b';
                } else {
                    document.getElementById('budgetWarning').textContent = '';
                }
                
                updateCharts(stats);
                renderExpenseList(stats.recent_expenses);
            } catch(e) {
                console.error('Stats error:', e);
            }
        }
        
        function initCharts() {
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: '支出', data: [], borderColor: '#00d4aa', backgroundColor: 'rgba(0,212,170,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#888' } }, y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#888' } } } }
            });
            
            const catCtx = document.getElementById('categoryChart').getContext('2d');
            categoryChart = new Chart(catCtx, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#ff6b6b', '#4ecdc4', '#ffd93d', '#a29bfe', '#00cec9', '#888'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff' } } } }
            });
        }
        
        function updateCharts(stats) {
            if (stats.daily_trend) {
                trendChart.data.labels = stats.daily_trend.map(d => d.date.slice(5));
                trendChart.data.datasets[0].data = stats.daily_trend.map(d => d.amount);
                trendChart.update();
            }
            
            if (stats.by_category && stats.by_category.length > 0) {
                categoryChart.data.labels = stats.by_category.map(c => c.category);
                categoryChart.data.datasets[0].data = stats.by_category.map(c => c.amount);
                categoryChart.update();
            }
        }
        
        function renderExpenseList(expenses) {
            const list = document.getElementById('expenseList');
            if (!expenses || expenses.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">暂无支出记录</div>';
                return;
            }
            
            list.innerHTML = expenses.map(e => `
                <div class="expense-item">
                    <div class="expense-left">
                        <div class="expense-icon" style="background: ${getCategoryColor(e.category)}20">${categoryIcons[e.category] || '📦'}</div>
                        <div class="expense-info">
                            <h4>${e.category}</h4>
                            <p>${e.description || e.date || ''}</p>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="expense-amount">-¥${parseFloat(e.amount).toFixed(2)}</span>
                        <button class="expense-delete" onclick="deleteExpense(${e.id})">×</button>
                    </div>
                </div>
            `).join('');
        }
        
        function getCategoryColor(cat) {
            const colors = { '餐饮': '#ff6b6b', '交通': '#4ecdc4', '购物': '#ffd93d', '娱乐': '#a29bfe', '生活': '#00cec9', '其他': '#888' };
            return colors[cat] || '#888';
        }
        
        async function toggleMonitor() {
            const res = await fetch(isMonitoring ? '/api/stop-monitor' : '/api/start-monitor', { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            isMonitoring = !isMonitoring;
            loadStatus();
        }
        
        function showAddModal() { document.getElementById('addModal').classList.add('show'); }
        function closeModal() { document.getElementById('addModal').classList.remove('show'); }
        
        async function addExpense() {
            const amount = parseFloat(document.getElementById('amountInput').value);
            const category = document.getElementById('categoryInput').value;
            const description = document.getElementById('descInput').value;
            
            if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
            
            await fetch('/api/expenses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount, category, description })
            });
            
            document.getElementById('amountInput').value = '';
            document.getElementById('descInput').value = '';
            closeModal();
            loadStatistics();
        }
        
        async function deleteExpense(id) {
            if (!confirm('确定删除这条记录？')) return;
            await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
            loadStatistics();
        }
        
        init();
    </script>
</body>
</html>
