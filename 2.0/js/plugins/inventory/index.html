<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品管理 - AI故事</title>
    <link rel="stylesheet" href="../../../css/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <h1>✨ AI故事</h1>
            <nav>
                <button class="nav-btn" onclick="window.location.href='../../../index.html?page=plugins'">⬅️ 返回</button>
                <button class="nav-btn" onclick="window.location.href='../../../index.html'">🏠 首页</button>
                <button class="nav-btn" onclick="window.location.href='../../../index.html?page=worlds'">🌍 世界</button>
                <button class="nav-btn" onclick="window.location.href='../../../index.html?page=characters'">👤 角色</button>
                <button class="nav-btn" onclick="window.location.href='../character-editor/index.html'">🧩 角色插件</button>
                <button class="nav-btn" onclick="window.location.href='../../../index.html?page=story'">📖 故事</button>
                <button class="nav-btn" onclick="window.location.href='../../../index.html?page=settings'">⚙️ 设置</button>
                <button class="nav-btn" onclick="window.location.href='../../../index.html?page=plugins'">🔌 插件</button>
            </nav>
        </div>
        
        <div class="main" id="mainContent"></div>
        
        <div class="right">
            <div id="rightPanel"></div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="mobile-nav" id="mobileNav"></div>

    <script src="../../plugin.js"></script>
    <script src="../../view.js"></script>
    
    <script src="index.js"></script>
    <script src="view.js"></script>
    
    <script src="../../ai.js"></script>
    <script src="../../data.js"></script>
    <script src="../../settings.js"></script>
    <script src="../../story.js"></script>
    <script>
        (function() {
            const mobileNavItems = [
                { page: 'plugins', icon: '🔌', label: '插件', url: '../../../index.html?page=plugins' },
                { page: 'home', icon: '🏠', label: '首页', url: '../../../index.html' },
                { page: 'inventory', icon: '🎒', label: '物品', url: '' },
                { page: 'task', icon: '📋', label: '任务', url: '../task/index.html' },
                { page: 'settings', icon: '⚙️', label: '设置', url: '../../../index.html?page=settings' }
            ];
            
            function init() {
                setupMobileNav();
                renderInventoryPage();
            }

            function setupMobileNav() {
                const mobileNav = document.getElementById('mobileNav');
                if (!mobileNav) return;
                
                mobileNav.innerHTML = mobileNavItems.map(item => `
                    <button class="mobile-nav-btn ${item.url === '' ? 'active' : ''}" data-url="${item.url}">
                        <span class="icon">${item.icon}</span>
                        <span class="label">${item.label}</span>
                    </button>
                `).join('');
                
                mobileNav.querySelectorAll('.mobile-nav-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const url = btn.dataset.url;
                        if (url) {
                            window.location.href = url;
                        }
                    });
                });
            }

            function renderInventoryPage() {
                const world = Data.getCurrentWorld();
                const main = document.getElementById('mainContent');
                
                if (!world) {
                    main.innerHTML = `<h2>物品管理</h2><p class="desc">请先选择一个世界</p><div class="empty">请先在"世界"页面选择一个世界</div>`;
                    return;
                }
                
                const chars = Data.getCharacters(world.id);
                
                if (chars.length === 0) {
                    main.innerHTML = `<h2>物品管理</h2><p class="desc">当前世界：${world.name}</p><div class="empty">暂无角色，请先添加角色</div>`;
                    return;
                }
                
                // 默认显示第一个角色的物品
                const firstChar = chars[0];
                const inventoryHtml = View.render('inventory.main', world.id, firstChar.id);
                
                main.innerHTML = `
                    <h2>物品管理</h2>
                    <p class="desc">当前世界：${world.name}</p>
                    
                    <div style="margin-bottom: 20px;">
                        <label>选择角色：</label>
                        <select id="charSelect" onchange="changeCharacter(this.value)">
                            ${chars.map(c => `<option value="${c.id}" ${c.id === firstChar.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                        </select>
                    </div>
                    
                    <div id="inventoryContent">
                        ${inventoryHtml}
                    </div>
                `;
            }

            window.changeCharacter = function(charId) {
                const world = Data.getCurrentWorld();
                if (!world) return;
                
                const inventoryHtml = View.render('inventory.main', world.id, charId);
                document.getElementById('inventoryContent').innerHTML = inventoryHtml;
            };

            window.closeModal = function() {
                document.getElementById('modal').classList.remove('active');
                // 重新渲染页面以更新物品列表
                renderInventoryPage();
            };

            // 暴露必要的函数给ViewCallbacks
            window.ViewCallbacks = window.ViewCallbacks || {};
        window.ViewCallbacks.inventory = {
            showAdd(characterId) {
                const plugin = PluginSystem.get('inventory');
                const library = plugin?.getItemLibrary() || [];
                let html = '<div style="margin-bottom: 12px;">';
                html += '<button class="btn btn-secondary" onclick="ViewCallbacks.inventory.showAddForm(\'' + characterId + '\')" style="margin-right: 8px;">✏️ 自定义添加</button>';
                if (library.length > 0) {
                    html += '<button class="btn btn-secondary" onclick="ViewCallbacks.inventory.showLibraryPicker(\'' + characterId + '\')">📚 从物品库选择</button>';
                }
                html += '</div>';
                html += '<div id="addItemForm"></div>';
                document.getElementById('modalTitle').textContent = '添加物品';
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('modal').classList.add('active');
            },
            
            showAddForm(characterId) {
                document.getElementById('modalBody').innerHTML = View.render('inventory.add', characterId);
            },
            
            add(characterId) {
                const world = Data.getCurrentWorld();
                const name = document.getElementById('itemName').value;
                if (!name) return;
                
                let effects = {};
                try {
                    effects = JSON.parse(document.getElementById('itemEffects').value || '{}');
                } catch {}
                
                const plugin = PluginSystem.get('inventory');
                plugin?.addItem(world.id, characterId, {
                    name,
                    type: document.getElementById('itemType').value,
                    effects
                });
                
                closeModal();
            },
            
            use(worldId, characterId, itemId) {
                const plugin = PluginSystem.get('inventory');
                const result = plugin?.useItem(worldId, characterId, itemId);
                if (result) {
                    renderInventoryPage();
                }
            },
            
            showLibrary() {
                const html = View.render('inventory.library');
                document.getElementById('modalTitle').textContent = '物品库管理';
                document.getElementById('modalBody').innerHTML = html;
                document.getElementById('modal').classList.add('active');
            },
            
            importFromPreset() {
                if (!confirm('从预设导入将添加新的物品到物品库，不会覆盖已有物品。是否继续？')) return;
                
                const plugin = PluginSystem.get('inventory');
                plugin._initDefaultLibrary(true).then(() => {
                    alert('导入成功！');
                    this.showLibrary();
                });
            },
            
            showAddToLibrary() {
                document.getElementById('modalBody').innerHTML = View.render('inventory.addToLibrary');
            },
            
            addLibrary() {
                const name = document.getElementById('libItemName').value;
                if (!name) return;
                
                let effects = {};
                try {
                    effects = JSON.parse(document.getElementById('libItemEffects').value || '{}');
                } catch {}
                
                const plugin = PluginSystem.get('inventory');
                plugin?.addToLibrary({
                    name,
                    type: document.getElementById('libItemType').value,
                    description: document.getElementById('libItemDesc').value,
                    effects,
                    icon: document.getElementById('libItemIcon').value
                });
                
                this.showLibrary();
            },
            
            editLibraryItem(itemId) {
                document.getElementById('modalBody').innerHTML = View.render('inventory.editLibrary', itemId);
            },
            
            saveLibraryItem(itemId) {
                const name = document.getElementById('editLibItemName').value;
                if (!name) return;
                
                let effects = {};
                try {
                    effects = JSON.parse(document.getElementById('editLibItemEffects').value || '{}');
                } catch {}
                
                const plugin = PluginSystem.get('inventory');
                plugin?.updateLibraryItem(itemId, {
                    name,
                    type: document.getElementById('editLibItemType').value,
                    description: document.getElementById('editLibItemDesc').value,
                    effects,
                    icon: document.getElementById('editLibItemIcon').value
                });
                
                this.showLibrary();
            },
            
            deleteLibraryItem(itemId) {
                if (!confirm('确定删除该物品吗？')) return;
                
                const plugin = PluginSystem.get('inventory');
                plugin?.removeFromLibrary(itemId);
                
                this.showLibrary();
            },
            
            showLibraryPicker(characterId) {
                document.getElementById('modalTitle').textContent = '从物品库添加';
                document.getElementById('modalBody').innerHTML = View.render('inventory.libraryPicker', characterId);
                document.getElementById('modal').classList.add('active');
            },
            
            addFromLibrary(characterId, itemId) {
                const world = Data.getCurrentWorld();
                const plugin = PluginSystem.get('inventory');
                const library = plugin?.getItemLibrary() || [];
                const item = library.find(i => i.id === itemId);
                
                if (item) {
                    plugin?.addItem(world.id, characterId, item);
                    closeModal();
                }
            }
        };

            init();
        })();
    </script>
</body>
</html>
